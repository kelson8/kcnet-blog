# Modified to make this get the Traefik IP for the blog.
# Use CF-Connecting-IP as the real IP header.
# This doesn't work for getting IPs in here behind Traefik.
# real_ip_header CF-Connecting-IP;

#-----
# For kcnet-blog and Traefik IP handling behind Cloudflare.
#-----

# Trust Traefik as a reverse proxy
# Set to the Traefik IP ranges, use docker network inspect <networkname> to get these.
set_real_ip_from 172.18.0.0/16;
set_real_ip_from 172.19.0.0/16;

real_ip_header X-Forwarded-For;