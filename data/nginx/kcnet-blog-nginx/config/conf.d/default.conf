server {
    listen 0.0.0.0:80;
    root /var/www/html;

    # This adds the Cloudflare IPs and the CF-Connecting-IP header.
    # This is required for proper IP logging behind Cloudflare.
    include /etc/nginx/cloudflare.conf;

    location / {
        index index.php index.html index.htm;
    }

    # New for custom error pages
    # https://www.digitalocean.com/community/tutorials/how-to-configure-nginx-to-use-custom-error-pages-on-ubuntu-14-04
    error_page 403 /error_pages/custom_403.html;
    error_page 404 /404.html;
    # location = /custom_404.html {
        
    # }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php_kcnet-blog:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root/$fastcgi_script_name;
    }
}
